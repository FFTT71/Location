<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning de Nettoyage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .refresh-info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            color: #1976d2;
            font-size: 14px;
        }
        
        .refresh-info .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .booking-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        
        .booking-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .booking-card.today {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation: highlight 2s infinite;
            border: 3px solid #fff;
        }
        
        .booking-card.upcoming {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .booking-card.past {
            background: linear-gradient(135deg, #868f96 0%, #596164 100%);
            opacity: 0.7;
        }
        
        @keyframes highlight {
            0%, 100% { box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6); }
        }
        
        .booking-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-badge {
            font-size: 14px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
        }
        
        .booking-detail {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 15px;
        }
        
        .booking-detail strong {
            font-weight: 600;
        }
        
        .booking-detail-full {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
        
        .countdown {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .no-bookings {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .no-bookings-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .no-bookings h3 {
            color: #666;
            margin-bottom: 10px;
        }
        
        .stats-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .stat-item {
            padding: 10px;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .last-update {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-tab {
            flex: 1;
            padding: 10px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-tab.active {
            background: #667eea;
            color: white;
        }
        
        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Planning d'intervention</h1>
        <p class="subtitle">Gîte: 36 rue d'Alsace 88110 Celles-sur-Plaine</p>
        
        <div class="refresh-info">
            <span class="pulse"></span>
            Mise à jour automatique toutes les 30 secondes
        </div>
        
        <div class="stats-summary">
            <div class="stat-item">
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">Aujourd'hui</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statWeek">0</div>
                <div class="stat-label">Cette semaine</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterBookings('all')">Toutes</button>
            <button class="filter-tab" onclick="filterBookings('upcoming')">À venir</button>
            <button class="filter-tab" onclick="filterBookings('past')">Passées</button>
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <div id="bookingsList">
            <div class="loading">🔄 Chargement des réservations...</div>
        </div>
        
        <div class="last-update">
            Dernière mise à jour : <span id="lastUpdate">--:--</span>
        </div>
    </div>
    
    <script>
        // ⚠️ WICHTIG: Fügen Sie hier Ihre Google Sheets Web-App URL ein
        const API_URL = 'https://script.google.com/macros/s/AKfycbyOlmgUwIkViXST6Je1sL7Uznur4ywnfiips1eMITBqDydvyHamHhTeUYX5yfmBFjps/exec';
        
        let currentFilter = 'all';
        let allBookings = [];
        
        // Beim Laden der Seite
        window.addEventListener('DOMContentLoaded', function() {
            loadBookings();
            
            // Auto-Refresh alle 30 Sekunden
            setInterval(loadBookings, 30000);
        });
        
        async function loadBookings() {
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error('Erreur de connexion');
                }
                
                allBookings = await response.json();
                displayBookings();
                updateStats();
                updateLastUpdate();
                hideError();
            } catch (error) {
                console.error('Erreur:', error);
                showError('Impossible de charger les réservations. Vérifiez votre connexion internet.');
            }
        }
        
        function filterBookings(filter) {
            currentFilter = filter;
            
            // Tab-Styling aktualisieren
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayBookings();
        }
        
        function displayBookings() {
    const list = document.getElementById('bookingsList');
    const today = new Date();
    today.setHours(0, 0, 0, 0); // Uhrzeit auf 00:00 setzen
    const todayStr = today.toISOString().split('T')[0];
    
    if (!allBookings || allBookings.length === 0) {
        list.innerHTML = `
            <div class="no-bookings">
                <div class="no-bookings-icon">✓</div>
                <h3>Aucune réservation</h3>
                <p>Aucun nettoyage n'est actuellement requis</p>
            </div>
        `;
        return;
    }
    
    let filteredBookings = allBookings;
    
    // Filtern basierend auf Ankunftsdatum
    if (currentFilter === 'upcoming') {
        // Zukünftige Buchungen (Ankunft ist heute oder später)
        filteredBookings = allBookings.filter(b => b.arrivalDate >= todayStr);
    } else if (currentFilter === 'past') {
        // Vergangene Buchungen (Ankunft war VOR heute)
        filteredBookings = allBookings.filter(b => b.arrivalDate < todayStr);
    }
    
    if (filteredBookings.length === 0) {
        list.innerHTML = `
            <div class="no-bookings">
                <div class="no-bookings-icon">📭</div>
                <h3>Aucune réservation dans cette catégorie</h3>
            </div>
        `;
        return;
    }
    
    filteredBookings.sort((a, b) => new Date(a.arrivalDate) - new Date(b.arrivalDate));
    
    list.innerHTML = filteredBookings.map(booking => {
        const arrivalDate = booking.arrivalDate;
        
        // Vergleich: Ist Ankunft heute?
        const isToday = arrivalDate === todayStr;
        
        // Vergleich: Ist Ankunft vor heute?
        const isPast = arrivalDate < todayStr;
        
        // Vergleich: Ist Ankunft in der Zukunft?
        const isFuture = arrivalDate > todayStr;
        
        let cardClass = '';
        let statusText = '';
        let countdownText = '';
        
        if (isToday) {
            // HEUTE = BLAU
            cardClass = 'today';
            statusText = '🔔 AUJOURD\'HUI';
            countdownText = '⏰ Aujourd\'hui !';
        } else if (isPast) {
            // VOR HEUTE = GRAU (Passé)
            cardClass = 'past';
            statusText = '✓ Terminé';
        } else if (isFuture) {
            // NACH HEUTE = LILA (À venir)
            cardClass = 'upcoming';
            
            const daysUntil = Math.ceil((new Date(arrivalDate) - today) / (1000 * 60 * 60 * 24));
            
            if (daysUntil === 1) {
                statusText = '📅 Demain';
                countdownText = '⏰ Demain !';
            } else if (daysUntil <= 7) {
                statusText = '📅 Bientôt';
                countdownText = `⏰ Dans ${daysUntil} jours`;
            } else {
                statusText = '📅 À venir';
                countdownText = `⏰ Dans ${daysUntil} jours`;
            }
        }
        
        return `
            <div class="booking-card ${cardClass}">
                <div class="booking-header">
                    <span>${booking.guestName || 'Client'}</span>
                    <span class="status-badge">${statusText}</span>
                </div>
                <div class="booking-detail">
                    <span><strong>Arrivée :</strong></span>
                    <span>${formatDate(booking.arrivalDate)}</span>
                </div>
                <div class="booking-detail">
                    <span><strong>Départ :</strong></span>
                    <span>${formatDate(booking.departureDate)}</span>
                </div>
                <div class="booking-detail">
                    <span><strong>Personnes :</strong></span>
                    <span>${booking.numPersons}</span>
                </div>
                <div class="booking-detail">
                    <span><strong>Nuits :</strong></span>
                    <span>${booking.numNights}</span>
                </div>
                ${booking.notes ? `
                    <div class="booking-detail-full">
                        <strong>Notes :</strong><br>
                        ${booking.notes}
                    </div>
                ` : ''}
                ${countdownText ? `<div class="countdown">${countdownText}</div>` : ''}
            </div>
        `;
    }).join('');
}
        
       function updateStats() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().split('T')[0];
    
    const nextWeek = new Date(today);
    nextWeek.setDate(nextWeek.getDate() + 7);
    const nextWeekStr = nextWeek.toISOString().split('T')[0];
    
    let total = 0, todayCount = 0, weekCount = 0;
    
    allBookings.forEach(booking => {
        total++;
        
        // Heute = Ankunftsdatum ist heute
        if (booking.arrivalDate === todayStr) {
            todayCount++;
        }
        
        // Diese Woche = Ankunft ist heute oder in den nächsten 7 Tagen
        if (booking.arrivalDate >= todayStr && booking.arrivalDate <= nextWeekStr) {
            weekCount++;
        }
    });
    
    document.getElementById('statToday').textContent = todayCount;
    document.getElementById('statWeek').textContent = weekCount;
    document.getElementById('statTotal').textContent = total;
}

        
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('fr-FR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                weekday: 'short',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '⚠️ ' + message;
            errorDiv.style.display = 'block';
            
            document.getElementById('bookingsList').innerHTML = `
                <div class="no-bookings">
                    <div class="no-bookings-icon">⚠️</div>
                    <h3>Erreur de connexion</h3>
                    <p>Nouvelle tentative dans 30 secondes...</p>
                </div>
            `;
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        // Benachrichtigungen (optional - funktioniert nur mit HTTPS)
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        
        // Neue Buchungen erkennen
        let lastBookingCount = 0;
        setInterval(() => {
            if (allBookings.length > lastBookingCount && lastBookingCount > 0) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('Nouvelle réservation !', {
                        body: 'Une nouvelle réservation a été ajoutée.',
                        icon: '🏠'
                    });
                }
            }
            lastBookingCount = allBookings.length;
        }, 30000);
    </script>
</body>
</html>
